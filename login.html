<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign In — Signal Deck</title>
<style>
  :root{
    --bg:#0b0c10; --surface:#15171c; --line:#2a2d34; --text:#e8e9ec; --muted:#9a9ea6; --accent:#4f8cff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:24px;
  }
  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:36px 32px; width:100%; max-width:360px;
  }
  h1{font-size:1.3rem; margin:0 0 6px;}
  p.sub{color:var(--muted); font-size:0.9rem; margin:0 0 24px;}
  label{display:block; font-size:0.85rem; margin-bottom:6px; color:var(--muted);}
  input{
    width:100%; padding:12px 14px; margin-bottom:16px; border-radius:10px;
    border:1px solid var(--line); background:#0f1013; color:var(--text); font-size:1rem;
  }
  input:focus{outline:none; border-color:var(--accent);}
  button{
    width:100%; padding:13px; border-radius:10px; border:none; background:var(--accent);
    color:#fff; font-size:1rem; font-weight:600; cursor:pointer; margin-top:8px;
  }
  button:active{opacity:0.85;}
  .error{color:#ff6b6b; font-size:0.85rem; margin:-8px 0 16px; display:none;}
  .error.show{display:block;}
</style>
</head>
<body>
  <div class="card">
    <h1>Signal Deck</h1>
    <p class="sub">Enter your credentials to continue.</p>
    <p class="error" id="errMsg">Incorrect username or password.</p>
    <form id="loginForm" method="POST" action="/api/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <input type="hidden" id="next" name="next" value="/">
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/";
    document.getElementById("next").value = next;
    if (params.get("error") === "1") {
      document.getElementById("errMsg").classList.add("show");
    }
  </script>
</body>
</html>
